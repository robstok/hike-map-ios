name: HikeMap
options:
  bundleIdPrefix: com.hitrekk
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.5.0"
  MapLibre:
    url: https://github.com/maplibre/maplibre-gl-native-distribution
    from: "6.7.1"

targets:
  HikeMap:
    type: application
    platform: iOS
    sources:
      - HikeMap
    resources:
      - path: HikeMap/Resources
        optional: true
    dependencies:
      - package: Supabase
        product: Supabase
      - package: MapLibre
        product: MapLibre
    info:
      path: HikeMap/App/Info.plist
      properties:
        CFBundleDisplayName: Hitrekk
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIApplicationSupportsIndirectInputEvents: true
        NSPhotoLibraryUsageDescription: "Access your photos to upload geotagged hiking photos"
        NSPhotoLibraryAddUsageDescription: "Save hiking route snapshots"
        UIDocumentBrowserSupportedFileTypes:
          - com.topografix.gpx
          - public.xml
        UTImportedTypeDeclarations:
          - UTTypeDescription: GPX Route File
            UTTypeIdentifier: com.topografix.gpx
            UTTypeConformsTo:
              - public.xml
            UTTypeTagSpecification:
              public.filename-extension:
                - gpx
    settings:
      base:
        SWIFT_VERSION: "5.9"
        DEVELOPMENT_TEAM: ""
        PRODUCT_BUNDLE_IDENTIFIER: com.hitrekk.hikemap
        TARGETED_DEVICE_FAMILY: "1,2"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        ENABLE_PREVIEWS: "YES"
